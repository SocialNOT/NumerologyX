<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NumerologyX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-up': {
                '0%': {
                  opacity: '0',
                  transform: 'translateY(20px)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'translateY(0)'
                },
              },
              'twinkle': {
                '0%, 100%': { opacity: 0.7, transform: 'scale(0.9)' },
                '50%': { opacity: 1, transform: 'scale(1.1)' }
              }
            },
            animation: {
              'fade-in': 'fade-in 0.3s ease-in-out forwards',
              'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
              'twinkle': 'twinkle 4s ease-in-out infinite'
            }
          }
        }
      }
    </script>
    <style>
      /* For custom scrollbar and other minor global styles */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(192, 132, 252, 0.5); /* purple-400 with opacity */
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(192, 132, 252, 0.8);
      }
      @keyframes aurora {
        from {
          background-position: 0% 50%;
        }
        to {
          background-position: 100% 50%;
        }
      }
      .aurora-background {
        background: linear-gradient(-45deg, #0a001a, #1d0a3b, #002d4e, #2e0b4b);
        background-size: 400% 400%;
        animation: aurora 20s ease infinite alternate;
      }
      .glow-border {
        position: relative;
      }
      .glow-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px; /* border width */
        background: linear-gradient(45deg, rgba(192, 132, 252, 0.5), rgba(56, 189, 248, 0.5));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-900 aurora-background">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
